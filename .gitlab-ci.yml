workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - when: never

stages:
  - build
  - test
  - migrate
  - docker
  - load-test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: load_testing
  DB_USER: postgres
  # DB_PASSWORD — set as a masked variable in GitLab: Settings → CI/CD → Variables

.postgres_service_vars: &postgres_service_vars
  POSTGRES_DB: $DB_NAME
  POSTGRES_USER: $DB_USER
  POSTGRES_PASSWORD: $DB_PASSWORD

cache:
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - bash scripts/app.sh build
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  services:
    - name: postgres:16
      alias: postgres
  variables:
    <<: *postgres_service_vars
    SPRING_PROFILES_ACTIVE: test
    SPRING_DATASOURCE_URL: jdbc:postgresql://$DB_HOST:$DB_PORT/$DB_NAME
    SPRING_DATASOURCE_USERNAME: $DB_USER
    SPRING_DATASOURCE_PASSWORD: $DB_PASSWORD
    JWT_SECRET: load-testing-jwt-secret-key-minimum-256-bits-long-for-hs256
  script:
    - bash scripts/app.sh test

migrate:
  stage: migrate
  image: liquibase/liquibase:4.27
  services:
    - name: postgres:16
      alias: postgres
  variables:
    <<: *postgres_service_vars
  script:
    - >
      liquibase
      --url="jdbc:postgresql://$DB_HOST:$DB_PORT/$DB_NAME"
      --username="$DB_USER"
      --password="$DB_PASSWORD"
      --changelog-file="db/changelog/db.changelog-master.xml"
      --search-path="src/main/resources"
      update

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

# Spins up the built JAR against a fresh postgres, seeds 100k movies via
# Liquibase, then runs smoke → load → stress k6 tests.
# Trigger: GitLab UI (manual web pipeline) or version tags (automatic).
# Set START_APP=false + TARGET_URL to test an existing deployment instead.
load-test:
  stage: load-test
  image: eclipse-temurin:17-jdk
  dependencies:
    - build
  services:
    - name: postgres:16
      alias: postgres
  variables:
    <<: *postgres_service_vars
    JWT_SECRET: load-testing-jwt-secret-key-minimum-256-bits-long-for-hs256
    APP_PORT: "8080"
    TARGET_URL: "http://localhost:8080"
    START_APP: "true"
    RESULTS_DIR: "k6-results"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq gpg curl ca-certificates
    - gpg --no-default-keyring
        --keyring /usr/share/keyrings/k6-archive-keyring.gpg
        --keyserver hkp://keyserver.ubuntu.com:80
        --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
    - echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main"
        | tee /etc/apt/sources.list.d/k6.list
    - apt-get update -qq && apt-get install -y -qq k6
    - k6 version
    - |
      if [ "$START_APP" = "true" ]; then
        JAR_FILE=$(ls target/*.jar | head -1)
        echo "Starting application: $JAR_FILE"
        java -jar "$JAR_FILE" \
          --spring.profiles.active=prod \
          --spring.datasource.url=jdbc:postgresql://postgres:5432/${DB_NAME} \
          --spring.datasource.username=${DB_USER} \
          --spring.datasource.password=${DB_PASSWORD} \
          --jwt.secret=${JWT_SECRET} \
          --app.seed=true \
          --server.port=${APP_PORT} \
          > app.log 2>&1 &
        echo "Application PID: $!"
      fi
  script:
    - bash scripts/load-test.sh "$TARGET_URL"
  after_script:
    - |
      if [ -f app.log ]; then
        echo "=== Last 50 lines of application log ==="
        tail -50 app.log
      fi
  artifacts:
    name: "k6-results-$CI_COMMIT_SHORT_SHA"
    expose_as: "Load Test Reports"
    paths:
      - k6-results/smoke-report.html
      - k6-results/load-report.html
      - k6-results/stress-report.html
      - k6-results/
      - app.log
    expire_in: 30 days
    when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always