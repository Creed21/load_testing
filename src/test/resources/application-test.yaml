spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/load_testing_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  seed: true
  jwt:
    secret: load-testing-jwt-secret-key-minimum-256-bits-long-for-hs256
    expiration: 86400000
